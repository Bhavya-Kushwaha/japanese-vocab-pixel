<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Vocab Quest v3.0</title>
    <!-- ADD THIS LINE FOR THE FAVICON -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
    body { 
        /* 1. REPLACE THE GRAY WITH THE PAGODA GARDEN */
        background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                    url('/static/background.gif');
        
        /* 2. PIXEL-PERFECT SCALING */
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;

        /* 3. KEEP YOUR ORIGINAL SETTINGS */
        font-family: 'Press Start 2P', cursive; 
        color: white; 
        scroll-behavior: smooth; 
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 4. MAKE CONTAINERS SEMI-TRANSPARENT (Optional but looks great) */
    .nes-container.is-dark {
        background-color: rgba(33, 37, 41, 0.85) !important;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
    }

    /* KEEP ALL YOUR CARD & TAB LOGIC UNTOUCHED */
    .pixel-card { margin-top: 15px; transition: transform 0.2s; position: relative; }
    .pixel-card:hover { transform: scale(1.01); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nes-btn.is-active { background-color: #209cee; color: white; }
    .delete-btn { position: absolute; top: -10px; right: -10px; z-index: 10; scale: 0.7; }
    
    /* CUSTOM MAROON RANK STYLES */
    .nes-progress.is-maroon::-webkit-progress-value { background-color: #8b0000; }
    .nes-progress.is-maroon::-moz-progress-bar { background-color: #8b0000; }
    .nes-progress.is-maroon::-ms-fill { background-color: #8b0000; }
    .nes-text.is-maroon { color: #8b0000 !important; }

    /* FLASHCARD STYLES */
    .flashcard-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
    }
    .flashcard {
        width: 100%;
        max-width: 350px;
        text-align: center;
        padding: 30px 20px;
        position: relative;
    }
    .flashcard .kanji {
        font-size: 5rem;
        margin-bottom: 20px;
        line-height: 1.2;
    }
    .flashcard hr {
        border-color: white;
        margin: 20px 0;
    }
    .flashcard .reading {
        font-size: 1rem;
        margin-bottom: 10px;
    }
    .flashcard .meaning {
        font-size: 0.8rem;
        color: #d1d5db;
    }
    .flashcard-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 15px;
    }

    /* KEEP YOUR CUSTOM SCROLLBAR */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #212529; }
    ::-webkit-scrollbar-thumb { background: #fff; border: 2px solid #212529; }
</style>
</head>
<body class="p-4 md:p-10">

    <!-- Floating Pixel Radio -->
    <div class="fixed top-4 right-4 z-50">
        <div class="nes-container is-dark is-rounded p-2 flex flex-col items-center gap-2" style="max-width: 180px;">
            <div class="flex items-center gap-2">
                <i class="nes-icon music is-small"></i>
                <span style="font-size: 7px;" id="trackName">Lofi Track</span>
            </div>
            <audio id="bgMusic" loop><source id="musicSource" src="/static/bg-music.webm" type="audio/webm"></audio>
            <div class="flex gap-1 w-full justify-center">
                <button onclick="toggleMusic()" id="playBtn" class="nes-btn is-primary p-1" style="font-size: 8px; width: 100%;">PLAY</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl md:text-3xl mb-4 nes-text is-primary text-center uppercase">Vocab Quest v3.0</h1>
        
        <!-- Gamification: Quest Progress -->
        <div class="nes-container is-dark mb-6">
            <p style="font-size: 9px;" class="mb-2">RANK: <span id="rankText" class="nes-text is-warning">NOVICE</span> | TOTAL: <span id="totalCount">0</span></p>
            <progress id="questBar" class="nes-progress is-success" value="0" max="50"></progress>
        </div>

        <!-- Cloud Sync Section -->
        <div class="nes-container with-title is-dark mb-8 mt-4">
            <p class="title">Cloud Sync</p>
            <div class="flex flex-col md:flex-row gap-2">
                <input type="email" id="userEmail" class="nes-input is-dark is-small" placeholder="Your email for backup...">
                <div class="flex gap-2">
                    <button onclick="cloudBackup()" class="nes-btn is-primary is-small">BACKUP</button>
                    <button onclick="cloudLoad()" class="nes-btn is-warning is-small">LOAD</button>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="nes-container with-title is-dark mb-10 mt-6">
            <p class="title">New Discovery</p>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="wordInput" class="nes-input is-dark" placeholder="Kanji / Hiragana..." autofocus>
                <button type="button" onclick="addWord()" class="nes-btn is-success">COLLECT</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-wrap gap-2 justify-center" id="tabBar">
                <button class="nes-btn tab-btn is-active is-small" onclick="showTab('ALL')">ALL</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('REVIEW')">REVIEW</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N5')">N5</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N4')">N4</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N3')">N3</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N2')">N2</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N1')">N1</button>
            </div>
            <button onclick="exportToCSV()" class="nes-btn is-primary is-small">EXPORT</button>
        </div>

        <!-- Search Bar -->
        <div class="nes-field is-inline mb-6 relative" id="searchContainer" style="position: relative;">
            <input type="text" id="searchInput" class="nes-input is-dark" placeholder="Search vocab..." oninput="handleSearch(this.value)">
            <button class="nes-btn is-error" id="clearSearchBtn" onclick="clearSearch()" style="display: none; position: absolute; right: 0; padding: 0 10px;">X</button>
        </div>

        <!-- Containers -->
        <div id="ALL" class="tab-content active"><div class="grid grid-cols-1 gap-4" id="list-ALL"></div></div>
        <div id="N5" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N5"></div></div>
        <div id="N4" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N4"></div></div>
        <div id="N3" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N3"></div></div>
        <div id="N2" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N2"></div></div>
        <div id="N1" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N1"></div></div>
        
        <div id="REVIEW" class="tab-content">
            <div class="flashcard-container" id="reviewContainer">
                <!-- Content generated by JS -->
            </div>
        </div>
        
        <button onclick="clearStorage()" class="nes-btn is-error is-small mt-10 w-full">RESET ALL DATA</button>
    </div>

    <script>
        async function cloudBackup() {
    const email = document.getElementById('userEmail').value;
    if(!email || !email.includes('@')) return alert("Please enter a valid email!");

    const formData = new URLSearchParams();
    formData.append('email', email);
    formData.append('vocab_list', JSON.stringify(myVocab));

    const res = await fetch('/sync', { method: 'POST', body: formData });
    const result = await res.json();
    if(result.success) alert("Quest data synced to cloud! ☁️");
    else alert("Error: " + result.error);
}

async function cloudLoad() {
    const email = document.getElementById('userEmail').value;
    if(!email) return alert("Enter email to load backup!");

    const formData = new URLSearchParams();
    formData.append('email', email);

    const res = await fetch('/load-backup', { method: 'POST', body: formData });
    const result = await res.json();
    
    if(result.success) {
        myVocab = JSON.parse(result.data);
        saveData(); // Updates LocalStorage
        renderAll(); // Updates UI
        alert("Quest progress restored! 📥");
    } else {
        alert("No backup found for this email.");
    }
}
        // --- 1. DATA INITIALIZATION ---
        let myVocab = JSON.parse(localStorage.getItem('vocabData')) || [];
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const q = urlParams.get('q');
            if (q) {
                document.getElementById('searchInput').value = q;
                document.getElementById('clearSearchBtn').style.display = 'inline-block';
                renderAll(q);
            } else {
                renderAll();
            }
        };

        // --- SEARCH LOGIC ---
        function handleSearch(query) {
            const clearBtn = document.getElementById('clearSearchBtn');
            clearBtn.style.display = query ? 'inline-block' : 'none';
            
            const newUrl = query ? `?q=${encodeURIComponent(query)}` : window.location.pathname;
            window.history.pushState({ path: newUrl }, '', newUrl);
            
            renderAll(query);
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            handleSearch('');
        }

        // --- 2. RADIO LOGIC ---
        function toggleMusic() {
            if (audio.paused) { 
                audio.play(); 
                playBtn.innerText = "STOP"; 
                playBtn.classList.replace('is-primary', 'is-error'); 
            }
            else { 
                audio.pause(); 
                playBtn.innerText = "PLAY"; 
                playBtn.classList.replace('is-error', 'is-primary'); 
            }
        }

        // --- 3. VOCAB LOGIC (CRUD) ---
        async function addWord() {
            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim();
            if(!word) return;

            const res = await fetch('/fetch', { method: 'POST', body: new URLSearchParams({'word': word}) });
            const data = await res.json();

            if(data.success) {
                const newEntry = {
                    id: Date.now(),
                    kanji: data.kanji,
                    reading: data.reading,
                    meaning: data.meaning,
                    level: data.level,
                    interval: 0,
                    repetition: 0,
                    efactor: 2.5,
                    nextReviewDate: Date.now()
                };
                myVocab.unshift(newEntry);
                saveData();
                renderAll();
                wordInput.value = "";
            }
        }

        function deleteWord(id) {
            myVocab = myVocab.filter(item => item.id !== id);
            saveData();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('vocabData', JSON.stringify(myVocab));
        }

        function clearStorage() {
            if(confirm("Delete all your progress?")) {
                localStorage.clear();
                myVocab = [];
                renderAll();
            }
        }

        // --- 4. UI RENDERING ---
        function renderAll(query = "") {
            const levels = ['ALL', 'N5', 'N4', 'N3', 'N2', 'N1'];
            levels.forEach(lvl => document.getElementById('list-' + lvl).innerHTML = '');

            const lowerQuery = query.toLowerCase().trim();
            const filteredVocab = myVocab.filter(item => {
                if (!lowerQuery) return true;
                return (item.kanji && item.kanji.toLowerCase().includes(lowerQuery)) ||
                       (item.reading && item.reading.toLowerCase().includes(lowerQuery)) ||
                       (item.meaning && item.meaning.toLowerCase().includes(lowerQuery));
            });

            if (filteredVocab.length === 0 && myVocab.length > 0 && lowerQuery) {
                document.getElementById('list-ALL').innerHTML = `<p class="nes-text is-error text-center mt-4" style="grid-column: 1 / -1;">No words found for "${query}"</p>`;
            }

            filteredVocab.forEach(item => {
                let colorClass = "is-dark";
                let textClass = "";

                if (item.level === "N5") { colorClass = "is-success"; textClass = "is-success"; }
                else if (item.level === "N4" || item.level === "N2") { colorClass = "is-primary"; textClass = "is-primary"; }
                else if (item.level === "N3") { colorClass = "is-warning"; textClass = "is-warning"; }
                else if (item.level === "N1") { colorClass = "is-error"; textClass = "is-error"; }

                const html = `
                <div class="nes-container with-title ${colorClass} is-dark pixel-card">
                    <button class="nes-btn is-error delete-btn" onclick="deleteWord(${item.id})">X</button>
                    <p class="title ${textClass}">LVL: ${item.level}</p>
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-xl md:text-2xl">${item.kanji}</span>
                            <span class="text-xs text-gray-400 mt-1">${item.reading}</span>
                        </div>
                        <div class="text-right"><span class="nes-text ${textClass} text-sm">${item.meaning}</span></div>
                    </div>
                </div>`;

                document.getElementById('list-ALL').insertAdjacentHTML('beforeend', html);
                if(item.level !== "???" && document.getElementById('list-' + item.level)) {
                    document.getElementById('list-' + item.level).insertAdjacentHTML('beforeend', html);
                }
            });
            updateStats();
        }

        function updateStats() {
            const count = myVocab.length;
            document.getElementById('totalCount').innerText = count;
            const bar = document.getElementById('questBar');
            const rankText = document.getElementById('rankText');
            
            let rank = "NOVICE";
            let max = 10;
            let value = count;
            let theme = "is-primary"; // Blue

            if (count >= 100) {
                rank = "LEGEND";
                max = 100;
                value = count - 100;
                if (value > 100) value = 100; // Cap visual progress at +100
                theme = "is-maroon"; // Deep Red
            } else if (count >= 50) {
                rank = "MASTER";
                max = 50; // Next goal is 100 (100 - 50 = 50)
                value = count - 50;
                theme = "is-error"; // Red
            } else if (count >= 30) {
                rank = "WARRIOR";
                max = 20; // 50 - 30 = 20
                value = count - 30;
                theme = "is-warning"; // Yellow
            } else if (count >= 10) {
                rank = "APPRENTICE";
                max = 20; // 30 - 10 = 20
                value = count - 10;
                theme = "is-success"; // Green
            }

            bar.max = max;
            bar.value = value;
            bar.className = `nes-progress ${theme}`;
            
            rankText.innerText = rank;
            rankText.className = `nes-text ${theme}`;
        }

        function showTab(level) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('is-active'));
            document.getElementById(level).classList.add('active');
            event.currentTarget.classList.add('is-active');
            
            if (level === 'REVIEW') {
                startReview();
            }
        }

        function exportToCSV() {
            if(myVocab.length === 0) return alert("No data to export!");
            let csv = "Kanji,Reading,Meaning,Level\n";
            myVocab.forEach(i => csv += `"${i.kanji}","${i.reading}","${i.meaning}","${i.level}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vocab_quest_export.csv';
            a.click();
        }

        document.getElementById("wordInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") addWord();
        });

        // --- 5. FLASHCARD REVIEW LOGIC (SRS) ---
        let reviewQueue = [];
        let currentReviewIndex = 0;

        function startReview() {
            const now = Date.now();
            let modified = false;
            
            // Auto-initialize missing SRS data for older words
            myVocab.forEach(item => {
                if (item.nextReviewDate === undefined) {
                    item.interval = 0;
                    item.repetition = 0;
                    item.efactor = 2.5;
                    item.nextReviewDate = now;
                    modified = true;
                }
            });
            if (modified) saveData();

            // Filter due cards
            reviewQueue = myVocab.filter(item => item.nextReviewDate <= now);
            
            if (reviewQueue.length === 0) {
                document.getElementById('reviewContainer').innerHTML = '<p class="nes-text is-success" style="text-align: center; margin-top: 50px;">You are all caught up for today! 🎉</p>';
                return;
            }

            // Shuffle due cards
            reviewQueue.sort(() => Math.random() - 0.5);
            currentReviewIndex = 0;
            renderFlashcard();
        }

        function renderFlashcard() {
            if (reviewQueue.length === 0) return;
            const item = reviewQueue[currentReviewIndex];
            
            const html = `
                <div class="nes-container is-dark is-rounded flashcard">
                    <div class="kanji">${item.kanji}</div>
                    <button id="showAnswerBtn" class="nes-btn is-warning is-small w-full" onclick="showAnswer()">SHOW ANSWER</button>
                    
                    <div id="answerSection" style="display: none;">
                        <hr>
                        <div class="reading">${item.reading}</div>
                        <div class="meaning">${item.meaning}</div>
                    </div>
                </div>
                <div id="flashcardActions" class="flashcard-actions" style="display: none;">
                    <button class="nes-btn is-error is-small" onclick="processReview(1)">AGAIN</button>
                    <button class="nes-btn is-primary is-small" onclick="processReview(4)">GOOD</button>
                    <button class="nes-btn is-success is-small" onclick="processReview(5)">EASY</button>
                </div>
            `;
            document.getElementById('reviewContainer').innerHTML = html;
        }

        function showAnswer() {
            document.getElementById('showAnswerBtn').style.display = 'none';
            document.getElementById('answerSection').style.display = 'block';
            document.getElementById('flashcardActions').style.display = 'flex';
        }

        function processReview(quality) {
            const item = reviewQueue[currentReviewIndex];
            
            // SM-2 Algorithm logic
            if (quality < 3) {
                item.repetition = 0;
                item.interval = 1;
            } else {
                if (item.repetition === 0) {
                    item.interval = 1;
                } else if (item.repetition === 1) {
                    item.interval = 6;
                } else {
                    item.interval = Math.round(item.interval * item.efactor);
                }
                item.repetition++;
            }

            item.efactor = item.efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
            if (item.efactor < 1.3) item.efactor = 1.3;

            // Calculate next review timestamp
            const msPerDay = 24 * 60 * 60 * 1000;
            item.nextReviewDate = Date.now() + (item.interval * msPerDay);
            
            // Apply updates to main myVocab array
            const vocabIndex = myVocab.findIndex(v => v.id === item.id);
            if (vocabIndex > -1) {
                myVocab[vocabIndex] = item;
                saveData();
            }

            // Remove reviewed card from the active queue
            reviewQueue.splice(currentReviewIndex, 1);
            
            if (reviewQueue.length === 0) {
                document.getElementById('reviewContainer').innerHTML = '<p class="nes-text is-success" style="text-align: center; margin-top: 50px;">You are all caught up for today! 🎉</p>';
            } else {
                if (currentReviewIndex >= reviewQueue.length) currentReviewIndex = 0;
                renderFlashcard();
            }
        }
    </script>
</body>
</html>
