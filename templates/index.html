<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Quest v3.0</title>
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    body { 
        /* 1. REPLACE THE GRAY WITH THE PAGODA GARDEN */
        background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                    url('../static/background.gif');
        
        /* 2. PIXEL-PERFECT SCALING */
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;

        /* 3. KEEP YOUR ORIGINAL SETTINGS */
        font-family: 'Press Start 2P', cursive; 
        color: white; 
        scroll-behavior: smooth; 
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 4. MAKE CONTAINERS SEMI-TRANSPARENT (Optional but looks great) */
    .nes-container.is-dark {
        background-color: rgba(33, 37, 41, 0.85) !important;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
    }

    /* KEEP ALL YOUR CARD & TAB LOGIC UNTOUCHED */
    .pixel-card { margin-top: 15px; transition: transform 0.2s; position: relative; }
    .pixel-card:hover { transform: scale(1.01); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nes-btn.is-active { background-color: #209cee; color: white; }
    .delete-btn { position: absolute; top: -10px; right: -10px; z-index: 10; scale: 0.7; }
    
    /* KEEP YOUR CUSTOM SCROLLBAR */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #212529; }
    ::-webkit-scrollbar-thumb { background: #fff; border: 2px solid #212529; }
</style>
</head>
<body class="p-4 md:p-10">

    <!-- Floating Pixel Radio -->
    <div class="fixed top-4 right-4 z-50">
        <div class="nes-container is-dark is-rounded p-2 flex flex-col items-center gap-2" style="max-width: 180px;">
            <div class="flex items-center gap-2">
                <i class="nes-icon music is-small"></i>
                <span style="font-size: 7px;" id="trackName">Lofi Track 1</span>
            </div>
            <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>
            <div class="flex gap-1">
                <button onclick="toggleMusic()" id="playBtn" class="nes-btn is-primary p-1" style="font-size: 8px;">PLAY</button>
                <button onclick="nextTrack()" class="nes-btn is-warning p-1" style="font-size: 8px;">NEXT</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl md:text-3xl mb-4 nes-text is-primary text-center uppercase">Vocab Quest v3.0</h1>
        
        <!-- Gamification: Quest Progress -->
        <div class="nes-container is-dark mb-6">
            <p style="font-size: 9px;" class="mb-2">RANK: <span id="rankText" class="nes-text is-warning">NOVICE</span> | TOTAL: <span id="totalCount">0</span></p>
            <progress id="questBar" class="nes-progress is-success" value="0" max="50"></progress>
        </div>

        <!-- Input Section -->
        <div class="nes-container with-title is-dark mb-10">
            <div class="nes-container with-title is-dark mb-6">
    <p class="title">Cloud Sync</p>
    <div class="flex flex-col md:flex-row gap-2">
        <input type="email" id="userEmail" class="nes-input is-dark is-small" placeholder="Your email for backup...">
        <div class="flex gap-2">
            <button onclick="cloudBackup()" class="nes-btn is-primary is-small">BACKUP</button>
            <button onclick="cloudLoad()" class="nes-btn is-warning is-small">LOAD</button>
        </div>
    </div>
</div>
            <p class="title">New Discovery</p>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="wordInput" class="nes-input is-dark" placeholder="Kanji / Hiragana..." autofocus>
                <button type="button" onclick="addWord()" class="nes-btn is-success">COLLECT</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-wrap gap-2 justify-center" id="tabBar">
                <button class="nes-btn tab-btn is-active is-small" onclick="showTab('ALL')">ALL</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N5')">N5</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N4')">N4</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N3')">N3</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N2')">N2</button>
                <button class="nes-btn tab-btn is-small" onclick="showTab('N1')">N1</button>
            </div>
            <button onclick="exportToCSV()" class="nes-btn is-primary is-small">EXPORT</button>
        </div>

        <!-- Containers -->
        <div id="ALL" class="tab-content active"><div class="grid grid-cols-1 gap-4" id="list-ALL"></div></div>
        <div id="N5" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N5"></div></div>
        <div id="N4" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N4"></div></div>
        <div id="N3" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N3"></div></div>
        <div id="N2" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N2"></div></div>
        <div id="N1" class="tab-content"><div class="grid grid-cols-1 gap-4" id="list-N1"></div></div>
        
        <button onclick="clearStorage()" class="nes-btn is-error is-small mt-10 w-full">RESET ALL DATA</button>
    </div>

    <script>
        async function cloudBackup() {
    const email = document.getElementById('userEmail').value;
    if(!email || !email.includes('@')) return alert("Please enter a valid email!");

    const formData = new URLSearchParams();
    formData.append('email', email);
    formData.append('vocab_list', JSON.stringify(myVocab));

    const res = await fetch('/sync', { method: 'POST', body: formData });
    const result = await res.json();
    if(result.success) alert("Quest data synced to cloud! ☁️");
    else alert("Error: " + result.error);
}

async function cloudLoad() {
    const email = document.getElementById('userEmail').value;
    if(!email) return alert("Enter email to load backup!");

    const formData = new URLSearchParams();
    formData.append('email', email);

    const res = await fetch('/load-backup', { method: 'POST', body: formData });
    const result = await res.json();
    
    if(result.success) {
        myVocab = JSON.parse(result.data);
        saveData(); // Updates LocalStorage
        renderAll(); // Updates UI
        alert("Quest progress restored! 📥");
    } else {
        alert("No backup found for this email.");
    }
}
        // --- 1. DATA INITIALIZATION ---
        let myVocab = JSON.parse(localStorage.getItem('vocabData')) || [];
        const playlist = [
            { name: "Tokyo Night", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "Akihabara 8-Bit", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Kyoto Lofi", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('bgMusic');
        const trackLabel = document.getElementById('trackName');
        const playBtn = document.getElementById('playBtn');

        window.onload = () => {
            renderAll();
            initRadio();
        };

        // --- 2. RADIO LOGIC ---
        function initRadio() {
            document.getElementById('musicSource').src = playlist[currentTrackIndex].url;
            trackLabel.innerText = playlist[currentTrackIndex].name;
            audio.load();
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); playBtn.innerText = "STOP"; playBtn.classList.replace('is-primary', 'is-error'); }
            else { audio.pause(); playBtn.innerText = "PLAY"; playBtn.classList.replace('is-error', 'is-primary'); }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            initRadio();
            audio.play();
            playBtn.innerText = "STOP";
            playBtn.classList.replace('is-primary', 'is-error');
        }

        // --- 3. VOCAB LOGIC (CRUD) ---
        async function addWord() {
            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim();
            if(!word) return;

            const res = await fetch('/fetch', { method: 'POST', body: new URLSearchParams({'word': word}) });
            const data = await res.json();

            if(data.success) {
                const newEntry = {
                    id: Date.now(),
                    kanji: data.kanji,
                    reading: data.reading,
                    meaning: data.meaning,
                    level: data.level
                };
                myVocab.unshift(newEntry);
                saveData();
                renderAll();
                wordInput.value = "";
            }
        }

        function deleteWord(id) {
            myVocab = myVocab.filter(item => item.id !== id);
            saveData();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('vocabData', JSON.stringify(myVocab));
        }

        function clearStorage() {
            if(confirm("Delete all your progress?")) {
                localStorage.clear();
                myVocab = [];
                renderAll();
            }
        }

        // --- 4. UI RENDERING ---
        function renderAll() {
            const levels = ['ALL', 'N5', 'N4', 'N3', 'N2', 'N1'];
            levels.forEach(lvl => document.getElementById('list-' + lvl).innerHTML = '');

            myVocab.forEach(item => {
                let colorClass = "is-dark";
                let textClass = "";

                if (item.level === "N5") { colorClass = "is-success"; textClass = "is-success"; }
                else if (item.level === "N4" || item.level === "N2") { colorClass = "is-primary"; textClass = "is-primary"; }
                else if (item.level === "N3") { colorClass = "is-warning"; textClass = "is-warning"; }
                else if (item.level === "N1") { colorClass = "is-error"; textClass = "is-error"; }

                const html = `
                <div class="nes-container with-title ${colorClass} is-dark pixel-card">
                    <button class="nes-btn is-error delete-btn" onclick="deleteWord(${item.id})">X</button>
                    <p class="title ${textClass}">LVL: ${item.level}</p>
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-xl md:text-2xl">${item.kanji}</span>
                            <span class="text-xs text-gray-400 mt-1">${item.reading}</span>
                        </div>
                        <div class="text-right"><span class="nes-text ${textClass} text-sm">${item.meaning}</span></div>
                    </div>
                </div>`;

                document.getElementById('list-ALL').insertAdjacentHTML('beforeend', html);
                if(item.level !== "???" && document.getElementById('list-' + item.level)) {
                    document.getElementById('list-' + item.level).insertAdjacentHTML('beforeend', html);
                }
            });
            updateStats();
        }

        function updateStats() {
            const count = myVocab.length;
            document.getElementById('totalCount').innerText = count;
            const bar = document.getElementById('questBar');
            bar.value = count;
            
            let rank = "NOVICE";
            if(count > 10) rank = "APPRENTICE";
            if(count > 30) rank = "WARRIOR";
            if(count > 50) rank = "MASTER";
            document.getElementById('rankText').innerText = rank;
        }

        function showTab(level) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('is-active'));
            document.getElementById(level).classList.add('active');
            event.currentTarget.classList.add('is-active');
        }

        function exportToCSV() {
            if(myVocab.length === 0) return alert("No data to export!");
            let csv = "Kanji,Reading,Meaning,Level\n";
            myVocab.forEach(i => csv += `"${i.kanji}","${i.reading}","${i.meaning}","${i.level}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vocab_quest_export.csv';
            a.click();
        }

        document.getElementById("wordInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") addWord();
        });
    </script>
</body>
</html>
